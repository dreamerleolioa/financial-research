            "skipped_symbols_count: \(if (.skipped_symbols | type) == "array" then (.skipped_symbols | length) else "n/a" end)",
            "skipped_symbol_reasons: \(.skipped_symbol_reasons // {})",
            "detail: \(.detail // "n/a")"
          ' "$refresh_response_file"
          if [[ ! "$refresh_http_status" =~ ^2[0-9][0-9]$ ]]; then
            cat "$refresh_response_file"
            exit 1
          fi
          if ! jq -e '.status == "completed"' "$refresh_response_file" >/dev/null; then
            echo "AVWAP repair did not complete; skip rescore and fail repair monitor."
            exit 1
          fi

          scoring_response_file="$(mktemp)"
          scoring_endpoint="${ZEABUR_BACKEND_URL%/}/internal/daily-radar/run-scoring"
          echo "Daily Radar repair run-scoring run_date: ${run_date}"
          scoring_http_status="$(curl -sS -o "$scoring_response_file" -w "%{http_code}" \
            -X POST "$scoring_endpoint" \
            -H "Authorization: Bearer ${DAILY_RADAR_INTERNAL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${daily_radar_payload}")"
          echo "Scoring HTTP status: ${scoring_http_status}"
          jq -r '
            "run_id: \(.run_id // "n/a")",
            "status: \(.status // "n/a")",
            "run_date: \(.run_date // "n/a")",
            "universe_count: \(.universe_count // "n/a")",
            "prefilter_count: \(.prefilter_count // "n/a")",
            "candidate_count: \(.candidate_count // "n/a")",
            "errors_count: \(if (.errors | type) == "array" then (.errors | length) else "n/a" end)",
            "detail: \(.detail // "n/a")"
          ' "$scoring_response_file"
          if [[ ! "$scoring_http_status" =~ ^2[0-9][0-9]$ ]]; then
            cat "$scoring_response_file"
            exit 1
          fi
          if ! jq -e '.status == "completed" or .status == "stale_data"' "$scoring_response_file" >/dev/null; then
            exit 1
          fi
