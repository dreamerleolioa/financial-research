            "run_date: \(.run_date // "n/a")",
            "symbol_count: \(.symbol_count // "n/a")",
            "records_written: \(.records_written // "n/a")",
            "missing_symbols_count: \(if (.missing_symbols | type) == "array" then (.missing_symbols | length) else "n/a" end)",
            "missing_symbol_reasons: \(.missing_symbol_reasons // {})",
            "skipped_symbols_count: \(if (.skipped_symbols | type) == "array" then (.skipped_symbols | length) else "n/a" end)",
            "skipped_symbol_reasons: \(.skipped_symbol_reasons // {})",
            "detail: \(.detail // "n/a")"
          ' "$response_file"
          if [[ ! "$http_status" =~ ^2[0-9][0-9]$ ]]; then
            cat "$response_file"
            exit 1
          fi
          if ! jq -e '.status == "completed"' "$response_file" >/dev/null; then
            echo "AVWAP refresh is optional evidence for scoring; leaving job successful for non-completed business status."
